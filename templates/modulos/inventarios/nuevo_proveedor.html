{% include '/modulos/clientes/admin_header.html' %}

{% block title %}Nuevo Proveedor - Inventarios{% endblock %}
{% block module_title %}<i class="fas fa-plus-circle me-2"></i>Nuevo Proveedor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0">Formulario de Registro de Proveedor</h6>
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('nuevo_proveedor') }}">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Nombre del Proveedor *</label>
                            <input type="text" name="nombre" class="form-control" 
                                   placeholder="Nombre de la empresa o persona" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="text" name="telefono" class="form-control" 
                                   placeholder="Ej: 2256-7890">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" 
                                   placeholder="contacto@proveedor.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección</label>
                            <textarea name="direccion" class="form-control" rows="2" 
                                      placeholder="Dirección física..."></textarea>
                        </div>
                        <div class="col-12 mt-4">
                            <hr>
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('listar_proveedores') }}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> Guardar Proveedor
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
